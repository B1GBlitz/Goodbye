<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Goodbye My Lovely Students</title>
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Vibur&display=swap" rel="stylesheet">
    
    <style>
        /* --- 1. การตั้งค่าพื้นฐาน (สีชมพูเข้มขึ้น) --- */
        :root { 
            /* ปรับสีให้เข้มขึ้นตามคำขอ */
            --bg-color: #ffcad4; 
            --bg-gradient: linear-gradient(135deg, #ffcad4 0%, #f4acb7 100%);
            --text-dark: #6d4c41; 
            --heart-color: #d81159; 
            --envelope-color: #ffffff;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; 
            background: var(--bg-gradient);
            color: var(--text-dark); 
            font-family: 'Itim', cursive; 
            width: 100%; min-height: 100vh; 
            overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- 2. หน้าแรก: ซองจดหมายสีขาว + หัวใจ --- */
        #landing-screen { 
            position: fixed; inset: 0; 
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            background: var(--bg-gradient);
            z-index: 1000; 
            transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        }
        
        .envelope-wrapper {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .envelope-wrapper:active { transform: scale(0.95); }

        /* ตัวซองจดหมาย (CSS Pure) */
        .envelope {
            width: 280px; height: 180px;
            background: var(--envelope-color);
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
        }
        
        /* ฝาซอง (สามเหลี่ยม) */
        .envelope::before {
            content: ''; position: absolute; top: 0; left: 0;
            border-left: 140px solid transparent;
            border-right: 140px solid transparent;
            border-top: 100px solid #f0f0f0; /* สีฝาซองเข้มกว่านิดนึง */
            border-radius: 10px;
        }

        /* หัวใจปิดผนึก */
        .seal-heart {
            position: absolute; top: 40px; z-index: 2;
            font-size: 50px; color: var(--heart-color);
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2));
            animation: beat 1s infinite;
        }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        
        .tap-text {
            margin-top: 30px; font-size: 1.4rem; color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            font-weight: bold;
        }

        /* --- 3. หน้าเนื้อหาหลัก --- */
        #main-content { 
            display: none; width: 100%; min-height: 100vh;
            justify-content: center; align-items: center; 
            position: relative; padding: 20px;
        }

        /* กล่องข้อความ */
        .message-box { 
            background: rgba(255, 255, 255, 0.9);
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.1); 
            max-width: 600px; width: 100%;
            min-height: 300px;
            position: absolute; /* ซ้อนทับกัน */
            opacity: 1; transition: opacity 1s, transform 1s;
            display: flex; justify-content: center; align-items: center;
        }
        
        #typed-text { 
            white-space: pre-wrap; line-height: 2; font-size: 1.2rem; 
            text-align: center; width: 100%;
        }

        /* --- 4. ฉากจบ (แอนิเมชัน) --- */
        #ending-scene {
            position: absolute; /* ซ้อนทับกัน */
            width: 100%; height: 500px; 
            opacity: 0; pointer-events: none; /* เริ่มต้นซ่อนไว้ */
            transition: opacity 1s, transform 1s;
            transform: scale(0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        /* สถานะตอนแสดงผล */
        .show-ending { opacity: 1 !important; pointer-events: auto !important; transform: scale(1) !important; }
        .hide-message { opacity: 0 !important; transform: scale(0.9) !important; pointer-events: none !important; }

        .container { width: 100%; height: 100%; position: relative; }
        
        /* น้องเด็ก */
        .body_left {
            width: 130px; position: absolute; bottom: 80px; right: 10%; z-index: 98;
            animation: bounceIn 2s infinite ease-in-out;
        }
        @keyframes bounceIn { 0%, 100% { transform: translateY(0) rotate(-3deg); } 50% { transform: translateY(-8px) rotate(3deg); } }
        .body_left img { width: 100%; height: auto; }

        /* หัวใจใหญ่ */
        .love {
            width: 520px; height: 440px;
            position: absolute; top: 50%; left: 50%; 
            /* จัดกึ่งกลางจอ */
            transform: translate(-50%, -50%) scale(0.5); 
            transform-origin: center center;
        }
        .love .block div {
            width: 40px; height: 40px; position: absolute;
            background: url("heart.png") no-repeat; 
            background-size: contain;
        }

        .logo { 
            text-align: center; width: 100%; position: absolute; bottom: 0; 
            opacity: 0; transition: opacity 1s; 
        }
        .logo b { font: 200 50px "Vibur", sans-serif; color: crimson; text-shadow: 0 0 15px #ffb7b2; }

        /* ปุ่มดูอีกครั้ง */
        #replay-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: white; color: var(--heart-color);
            border: 2px solid var(--heart-color);
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Itim';
            display: none; /* ซ่อนก่อน */
            z-index: 100;
        }

        /* --- อื่นๆ --- */
        .floating-hearts-container { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
        .float-heart { 
            position: absolute; bottom: -50px; 
            font-size: 20px; color: var(--heart-color); opacity: 0.5; 
            animation: floatUpSoft linear forwards; 
        }
        @keyframes floatUpSoft { to { transform: translateY(-110vh) rotate(360deg); opacity: 0; } }

        @media (min-width: 600px) {
            .love { transform: translate(-50%, -50%) scale(0.8); }
        }
    </style>
</head>

            </div>
